<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>macro_railroad — Syntax Diagram Generator</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/mode-rust.min.js"></script>
    <script type="module" src="main.js"></script>
</head>
<body>
    <div class="app-container">

        <header class="app-header">
            <span class="app-title">macro_railroad</span>
            <a class="github-link" href="https://github.com/lukaslueg/macro_railroad" target="_blank" rel="noopener noreferrer">
                <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                Fork me on GitHub
            </a>
            <button class="btn btn-secondary" id="copy-svg">Copy SVG</button>
            <button class="btn btn-secondary" id="toggle-options">
                <span id="toggle-options-label">Hide Options</span>
            </button>
            <button class="theme-toggle btn btn-secondary" id="theme-toggle">
                <span id="theme-toggle-label">Dark mode</span>
            </button>
        </header>

        <main class="main-content">
            <div class="editor-area">
                <div class="editor-panel">
                    <h3>Input</h3>
                </div>
                <div id="ace-editor"></div>
            </div>
            <div
                class="resize-handle"
                id="editor-resize-handle"
                role="separator"
                aria-label="Resize input area"
                aria-orientation="horizontal"
            ></div>
            <div class="diagram-area" id="diagram-area">
                <div id="output"></div>
                <div class="diagram-nav">
                    <button class="diagram-nav-btn" id="zoom-in" title="Zoom in">+</button>
                    <button class="diagram-nav-btn" id="zoom-out" title="Zoom out">&minus;</button>
                    <button class="diagram-nav-btn diagram-nav-btn-label" id="zoom-reset" title="Reset view">Reset</button>
                </div>
            </div>
        </main>

        <aside class="options-panel">
            <h3>Options</h3>
            <div class="option-item">
                <label class="option-label" for="editor-theme">Editor Theme</label>
                <select id="editor-theme" class="theme-select">
                    <optgroup label="Light">
                        <option value="ace/theme/github">GitHub</option>
                        <option value="ace/theme/chrome">Chrome</option>
                        <option value="ace/theme/eclipse">Eclipse</option>
                        <option value="ace/theme/solarized_light">Solarized Light</option>
                    </optgroup>
                    <optgroup label="Dark">
                        <option value="ace/theme/twilight">Twilight</option>
                        <option value="ace/theme/monokai">Monokai</option>
                        <option value="ace/theme/tomorrow_night">Tomorrow Night</option>
                        <option value="ace/theme/solarized_dark">Solarized Dark</option>
                    </optgroup>
                </select>
            </div>
            <div class="option-item">
                <div class="checkbox-wrapper">
                    <label class="option-label" for="opt_hide_internal">Hide macro-internal rules</label>
                    <input type="checkbox" id="opt_hide_internal" checked>
                </div>
            </div>
            <div class="option-item">
                <div class="checkbox-wrapper">
                    <label class="option-label" for="opt_preserve_groups">Preserve groups</label>
                    <input type="checkbox" id="opt_preserve_groups" checked>
                </div>
            </div>
            <div class="option-item">
                <div class="checkbox-wrapper">
                    <label class="option-label" for="opt_fold_common_tails">Optimize layout</label>
                    <input type="checkbox" id="opt_fold_common_tails" checked>
                </div>
            </div>
            <div class="option-item">
                <div class="checkbox-wrapper">
                    <label class="option-label" for="opt_show_legend">Create legend</label>
                    <input type="checkbox" id="opt_show_legend" checked>
                </div>
            </div>
            <div class="option-item">
                <div class="checkbox-wrapper">
                    <label class="option-label" for="opt_bright">Bright diagram</label>
                    <input type="checkbox" id="opt_bright" checked>
                </div>
            </div>

            <h3>Examples</h3>
            <ul class="example-list">
                <li><a href="#" data-macro="panic">panic!()</a></li>
                <li><a href="#" data-macro="bitflags">bitflags!()</a></li>
                <li><a href="#" data-macro="cfg_if">cfg_if!()</a></li>
                <li><a href="#" data-macro="gfxdefines">gfx_defines!()</a></li>
                <li><a href="#" data-macro="sep">sep!()</a></li>
                <li><a href="#" data-macro="method">method!()</a></li>
                <li><a href="#" data-macro="cond_reduce">cond_reduce!()</a></li>
                <li><a href="#" data-macro="named_attrs">named_args!()</a></li>
                <li><a href="#" data-macro="verify">verify!()</a></li>
                <li><a href="#" data-macro="hodor">HODOR!()</a></li>
            </ul>

            <div class="version-info" id="version-info"></div>
        </aside>

    </div>
</body>
</html>
